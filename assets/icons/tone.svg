<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="sbg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a4e"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </radialGradient>
    <radialGradient id="scone" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#555"/>
      <stop offset="60%"  stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <linearGradient id="sring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff5ecb"/>
      <stop offset="35%"  stop-color="#7b5cfa"/>
      <stop offset="70%"  stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#ff5ecb"/>
    </linearGradient>
    <filter id="sglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Glow ring -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="url(#sring)" stroke-width="5" filter="url(#sglow)" opacity="0.9"/>
  <!-- Background -->
  <circle cx="50" cy="50" r="44" fill="url(#sbg)"/>
  <!-- Inner border -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#sring)" stroke-width="1.5" opacity="0.6"/>

  <!-- Speaker outer ring (gold) -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#c9922a" stroke-width="5"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="#e8b84b" stroke-width="1"/>
  <!-- Speaker cone -->
  <circle cx="50" cy="50" r="22" fill="url(#scone)"/>
  <!-- Cone rings -->
  <circle cx="50" cy="50" r="17" fill="none" stroke="#444" stroke-width="1" opacity="0.7"/>
  <circle cx="50" cy="50" r="12" fill="none" stroke="#444" stroke-width="1" opacity="0.7"/>
  <circle cx="50" cy="50" r="7"  fill="none" stroke="#555" stroke-width="1" opacity="0.8"/>
  <!-- Centre dust cap -->
  <circle cx="50" cy="50" r="5" fill="#222" stroke="#666" stroke-width="0.8"/>
  <circle cx="50" cy="50" r="2" fill="#333"/>
  <!-- Bolt highlights on outer ring -->
  <circle cx="50" cy="23" r="2" fill="#e8b84b"/>
  <circle cx="50" cy="77" r="2" fill="#e8b84b"/>
  <circle cx="23" cy="50" r="2" fill="#e8b84b"/>
  <circle cx="77" cy="50" r="2" fill="#e8b84b"/>

  <!-- Musical notes floating right -->
  <text x="70" y="36" font-size="11" fill="#00ddff" opacity="0.9" font-family="serif">♪</text>
  <text x="76" y="52" font-size="9"  fill="#dd88ff" opacity="0.8" font-family="serif">♫</text>

  <!-- Sparkle dots -->
  <circle cx="20" cy="26" r="1.5" fill="#ffdd55" opacity="0.9"/>
  <circle cx="78" cy="22" r="1.8" fill="#ff88dd" opacity="0.8"/>
  <circle cx="82" cy="75" r="1.5" fill="#55eeff" opacity="0.9"/>
  <circle cx="17" cy="70" r="1"   fill="#aa88ff" opacity="0.8"/>
</svg>
